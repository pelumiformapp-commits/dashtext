<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashText</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Your App Logic -->
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app-container">
    <div id="login-screen" class="screen active-screen">
      <div class="login-card">
        <div class="logo">💬</div>
        <h2>Welcome to DashText</h2>
        <p>Free messaging & calls</p>
        <form id="login-form">
          <input type="text" id="name-input" placeholder="Enter your name" required>
          <input type="password" id="password-input" placeholder="Room password" required>
          <input type="text" id="room-input" placeholder="Room Code: leave empty for Global">
          <button type="submit">Start Chatting</button>
        </form>
      </div>
    </div>

    <div id="main-chat-screen" class="screen">
      <div class="chat-interface">
        <div class="sidebar">
          <div class="sidebar-header">
            <div class="user-avatar">👤</div>
            <div class="brand-title">DashText</div>
          </div>
          <div class="chat-list">
            <div class="chat-item active">
              <div class="avatar">🌐</div>
              <div class="chat-info">
                <div class="chat-name">Global Room</div>
                <div class="chat-preview">Everyone here</div>
              </div>
            </div>
          </div>
        </div>

        <div class="chat-window">
          <div class="chat-header">
            <div class="chat-header-info">
              <div class="avatar">🌐</div>
              <div>
                <div class="room-title">Global Room</div>
                <div class="status">Online</div>
              </div>
            </div>
            <button id="edit-name-btn" style="background:none;border:none;font-size:20px;cursor:pointer;margin-right:8px">✏️</button>
            <button id="theme-btn" style="background:none;border:none;font-size:20px;cursor:pointer;margin-right:8px">🎨</button>
            <button id="font-btn" style="background:none;border:none;font-size:20px;cursor:pointer;margin-right:8px">🔤</button>
            <button id="settings-btn" style="background:none;border:none;font-size:20px;cursor:pointer;margin-right:8px">⚙️</button>
            <button id="users-btn" style="background:none;border:none;font-size:20px;cursor:pointer;margin-right:8px">👥</button>
            <button id="call-btn">📞</button>
          </div>
          <div class="message-box" id="message-box"></div>
          <form class="input-area" id="message-form">
            <button id="burn-btn" type="button" title="Burn after reading" style="background:none;border:none;font-size:20px;padding:8px;opacity:0.4">🔥</button>
            <button id="anon-btn" type="button" title="Anonymous mode" style="background:none;border:none;font-size:20px;padding:8px;opacity:0.4">🥷</button>
            <button id="ai-btn" type="button" title="AI reply" style="background:none;border:none;font-size:20px;padding:8px">⚡</button>
            <button id="gif-btn" type="button" title="GIF" style="background:none;border:none;font-size:20px;padding:8px">🎬</button>
            <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
            <button type="submit">Send</button>
          </form>
        </div>
      </div>
    </div>

    <div id="call-overlay" class="call-overlay hidden">
      <div class="call-card">
        <div class="calling-avatar">📞</div>
        <h3>Global Room</h3>
        <div class="webrtc-tag" id="call-status">Connecting...</div>
        <button id="end-call-btn">End Call</button>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="gif-modal" style="display:none;">
      <div class="gif-modal-content" style="max-width:350px;height:auto;max-height:80vh;">
        <div class="gif-header">
          <div style="font-weight:600;font-size:18px">⚙️ Settings</div>
          <button id="settings-close">✖️</button>
        </div>
        <div style="padding:16px;overflow-y:auto">
          <div style="margin-bottom:20px">
            <div style="font-weight:600;margin-bottom:8px;color:#111b21">Profile</div>
            <button id="change-name-setting" style="width:100%;padding:10px;background:#f0f2f5;border:none;border-radius:8px;margin-bottom:8px;text-align:left">✏️ Change Name</button>
            <button id="change-room-setting" style="width:100%;padding:10px;background:#f0f2f5;border:none;border-radius:8px;text-align:left">🚪 Switch Room</button>
          </div>
          
          <div style="margin-bottom:20px">
            <div style="font-weight:600;margin-bottom:8px;color:#111b21">Appearance</div>
            <button id="theme-setting" style="width:100%;padding:10px;background:#f0f2f5;border:none;border-radius:8px;margin-bottom:8px;text-align:left">🎨 Change Colors</button>
            <button id="font-setting" style="width:100%;padding:10px;background:#f0f2f5;border:none;border-radius:8px;text-align:left">🔤 Font Size</button>
          </div>
          
          <div style="margin-bottom:20px">
            <div style="font-weight:600;margin-bottom:8px;color:#111b21">Privacy</div>
            <button id="clear-chat-setting" style="width:100%;padding:10px;background:#ffebee;border:none;border-radius:8px;margin-bottom:8px;text-align:left;color:#d32f2f">🗑️ Clear This Room</button>
          </div>
          
          <div style="margin-bottom:12px">
            <div style="font-weight:600;margin-bottom:8px;color:#111b21">Account</div>
            <button id="logout-setting" style="width:100%;padding:10px;background:#ffebee;border:none;border-radius:8px;text-align:left;color:#d32f2f">🚪 Logout</button>
          </div>
          
          <div style="font-size:11px;color:#667781;text-align:center;margin-top:16px">
            Room: <span id="current-room-display">Global Room</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <audio id="remote-audio" autoplay playsinline></audio>
</body>
</html>
